name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      - name: Unit tests (gates the zero-false-positive corpus invariant)
        run: swift test

      - name: Engine self-test (dictionaries load + headline conversions)
        run: swift run LayoutSwitcher --selftest
